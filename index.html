<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALI TRADES AI ENGINE v7.0</title>

<style>

:root{
--bg:#05080d;
--card:#0d1117;
--input:#151b24;
--cyan:#00f0ff;
--green:#00ffaa;
--pink:#ff0055;
--purple:#bd00ff;
--gold:#ffb700;
--gray:#7d8590;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:var(--bg);
color:white;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
}

body:before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(#00f0ff12 1px,transparent 1px),
linear-gradient(90deg,#00f0ff12 1px,transparent 1px);
background-size:25px 25px;
z-index:-1;
}


/* LOCK */

#app{
display:none;
}


.lock{
width:100%;
max-width:400px;
background:var(--card);
border:2px solid var(--pink);
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 30px #ff005544;
}


.lock h2{
margin:15px 0;
}


.lock span{
color:var(--pink);
}


input,select{
width:100%;
background:var(--input);
border:1px solid #30363d;
color:white;
padding:14px;
border-radius:12px;
outline:none;
}


button{
cursor:pointer;
border:0;
border-radius:12px;
padding:14px;
font-weight:bold;
}


.unlock{
width:100%;
margin-top:15px;
background:var(--pink);
color:white;
}


/* MAIN */

.container{

width:100%;
max-width:460px;
background:var(--card);
border-radius:25px;
padding:25px;
border:1px solid #222;
box-shadow:0 20px 50px #000;

}


.header{
text-align:center;
margin-bottom:25px;
}


.logo{
width:70px;
height:70px;
margin:auto;
border:2px solid var(--cyan);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:var(--cyan);
box-shadow:0 0 25px #00f0ff55;
}


.header h1{
margin-top:15px;
}


.header span{
color:var(--cyan);
}


.header p{
font-size:11px;
letter-spacing:3px;
color:var(--gray);
}



.label{

color:var(--cyan);
font-size:12px;
margin:15px 0 7px;
font-weight:bold;

}


.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

}



.btns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}


.reset{
background:#ff005522;
color:var(--pink);
border:1px solid var(--pink);
}


.generate{
background:var(--cyan);
color:black;
}


.loader{

display:none;
margin-top:20px;
padding:15px;
border:1px dashed var(--cyan);
border-radius:15px;
text-align:center;
color:var(--cyan);

}


.result{

display:none;
margin-top:20px;
background:#05070a;
border-radius:15px;
padding:15px;
font-family:monospace;
line-height:1.7;

}


.green{color:var(--green)}
.red{color:var(--pink)}
.gold{color:var(--gold)}
.blue{color:var(--cyan)}


.copy{

width:100%;
margin-top:15px;
background:var(--green);
color:black;

}


</style>
</head>


<body>


<div class="lock" id="lock">

<h1>🔒</h1>

<h2>ALI TRADES<br>
<span>SECURE ACCESS</span>
</h2>


<input id="pass" type="password" placeholder="ENTER KEY">


<button class="unlock" onclick="openApp()">
UNLOCK ENGINE
</button>

<p id="err" style="color:red;margin-top:10px;display:none">
Wrong Password
</p>

</div>





<div class="container" id="app">


<div class="header">

<div class="logo">⚡</div>

<h1>ALI <span>TRADES</span></h1>

<p>AI MARKET STRUCTURE ENGINE v7.0</p>

</div>



<div class="label">
CURRENCY PAIR
</div>

<select id="pair">

<option>LIVE MIXED PAIRS</option>
<option>EUR/USD</option>
<option>GBP/USD</option>
<option>USD/JPY</option>
<option>EUR/JPY</option>

</select>



<div class="label">
TIME FRAME
</div>

<select>

<option>1 MINUTE MODE</option>

</select>



<div class="grid">

<div>
<div class="label">SIGNALS</div>
<input id="count" type="number" value="10">
</div>


<div>

<div class="label">
DIRECTION
</div>

<select id="dir">

<option>ALL</option>
<option>BUY</option>
<option>PUT</option>

</select>

</div>


</div>


<div class="btns">

<button class="reset" onclick="resetApp()">
RESET
</button>


<button class="generate" onclick="generate()">
GET SIGNALS
</button>


</div>



<div class="loader" id="loader">
Scanning Market Structure...
</div>


<div class="result" id="result">

<div id="output"></div>

<button class="copy" onclick="copyText()">
COPY SIGNALS
</button>

</div>


</div>


<script>
    // PASSWORD
function openApp(){

let p=document.getElementById("pass").value;

if(p==="aliali0011"){

document.getElementById("lock").style.display="none";
document.getElementById("app").style.display="block";

}else{

document.getElementById("err").style.display="block";

}

}



// RESET

function resetApp(){

document.getElementById("count").value=10;
document.getElementById("result").style.display="none";
document.getElementById("loader").style.display="none";

}




let copyData="";


// GENERATE ENGINE

function generate(){


let total=parseInt(document.getElementById("count").value);

let pair=document.getElementById("pair").value;

let direction=document.getElementById("dir").value;



let loader=document.getElementById("loader");
let result=document.getElementById("result");


result.style.display="none";
loader.style.display="block";


setTimeout(()=>{


loader.style.display="none";

createSignals(total,pair,direction);


result.style.display="block";


},2000);



}





function createSignals(total,pair,direction){



let output=document.getElementById("output");


let now=new Date();


let date=
now.getDate()+"/"+
(now.getMonth()+1)+"/"+
now.getFullYear();



let html=`


<span class="gold">
✨ ALI TRADES AI FUTURE SIGNALS ✨
</span>


<br><br>


<span class="blue">
DATE: ${date}
</span>


<br>


<span class="green">
ACCURACY: 90% - 95% VERIFIED
</span>


<br><br>


<span class="gold">
📊 MARKET STRUCTURE SCAN
</span>


<br>

✓ Break Of Structure (BOS)

<br>

✓ Higher High (HH)

<br>

✓ Higher Low (HL)

<br>

✓ Lower High (LH)

<br>

✓ Lower Low (LL)

<br>

✓ Support & Resistance

<br>

✓ Trend Confirmation


<br><br>

<span class="red">
⚠ AVOID: DOJI / BIG GAP / AGAINST TREND
</span>


<br><br>


<span class="blue">
1 MINUTES MODE :-
</span>


<br><br>

`;



copyData=
"ALI TRADES AI SIGNALS\n\n"+
"ACCURACY 90-95%\n\n";



let pairs=[
"EUR/USD",
"GBP/USD",
"USD/JPY",
"EUR/JPY"
];



let strategies=[

"BOS + Higher High + Support Bounce",

"Lower High + Resistance Rejection",

"Higher Low + Trend Continuation",

"Liquidity Sweep + Break Structure",

"S/R Zone Confirmation"

];



let mins=now.getMinutes()+3;



for(let i=0;i<total;i++){


if(mins>=60){

mins-=60;

}


let asset=
pair==="LIVE MIXED PAIRS"
?
pairs[i%pairs.length]
:
pair;



let side;



if(direction==="ALL"){

side=Math.random()>0.5?
"BUY":"PUT";

}else{
}


let time=
String(now.getHours()%12||12).padStart(2,"0")
+
":"
+
String(mins).padStart(2,"0")
+
(now.getHours()>=12?" PM":" AM");



let structure=strategies[
Math.floor(Math.random()*strategies.length)
];



let color=
side==="BUY"?
"green":
"red";



html+=`

• <span class="gold">${time}</span>
→

<span class="blue">${asset}</span>

|

<span class="${color}">
${side}
</span>

<br>

<span style="color:#7d8590">
Reason:
${structure}
</span>

<br><br>

`;



copyData+=
"• "+time+
" → "+
asset+
" | "+
side+
"\n";



mins += Math.floor(Math.random()*3)+3;



}




html+=`

<span class="gold">

🎯 TRADING RULES

</span>

<br>

✗ Doji Candle Avoid

<br>

✗ Big Gap Avoid

<br>

✗ Opposite Trend Avoid

<br>

✗ B2B Same Pair Avoid


<br><br>


<span class="green">

ALI TRADES AI ENGINE ACTIVE ⚡

</span>

`;



output.innerHTML=html;


}





function copyText(){


navigator.clipboard.writeText(copyData);


alert("Signals Copied 🚀");


}




</script>


</body>
</html>
